apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-flask-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-flask-app
  template:
    metadata:
      labels:
        app: my-flask-app
    spec:
      containers:
      - name: flask-container
        image: cloudnative:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
